<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budowac</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a2430;
        color: #f2f4f8;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        user-select: none;
      }
      canvas { display: block; outline: none; }
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: .7rem 1rem;
        pointer-events: none;
        z-index: 2;
        text-shadow: 0 1px 2px rgba(0,0,0,.65);
      }
      #hud h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 650;
        letter-spacing: .05em;
      }
      #hud p {
        margin: .2rem 0 0;
        font-size: .78rem;
        color: #d5dde8;
      }
      #hud .muted { color: #a8b4c4; }
      #crosshair {
        position: fixed;
        left: 50%; top: 50%;
        width: 14px; height: 14px;
        margin: -7px 0 0 -7px;
        pointer-events: none;
        z-index: 3;
        opacity: .35;
        transition: opacity .15s ease;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: #fff;
        box-shadow: 0 0 2px #000;
      }
      #crosshair::before {
        left: 6px; top: 0;
        width: 2px; height: 14px;
      }
      #crosshair::after {
        left: 0; top: 6px;
        width: 14px; height: 2px;
      }
      #hotbar {
        position: fixed;
        left: 50%;
        bottom: 1.1rem;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        z-index: 2;
        pointer-events: none;
      }
      .hotbar-slot {
        width: 44px; height: 44px;
        border: 2px solid rgba(255,255,255,.28);
        border-radius: 6px;
        background: rgba(10, 16, 24, .55);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,.35);
      }
      .hotbar-slot.active {
        border-color: #fff;
        background: rgba(20, 34, 50, .75);
        transform: translateY(-3px);
      }
      .hotbar-slot .swatch {
        width: 26px; height: 26px;
        border-radius: 3px;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
      }
      .hotbar-slot .key {
        position: absolute;
        top: 1px; left: 4px;
        font-size: .62rem;
        color: #cdd6e2;
        opacity: .85;
      }
      #hint {
        position: fixed;
        left: 50%;
        bottom: 4.4rem;
        transform: translateX(-50%);
        font-size: .78rem;
        color: #e8eef6;
        text-shadow: 0 1px 2px #000;
        opacity: .9;
        z-index: 2;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <h1>Budowac</h1>
      <p id="status">boot…</p>
      <p id="coords" class="muted"></p>
      <p id="net" class="muted"></p>
    </div>
    <div id="crosshair"></div>
    <div id="hint"></div>
    <div id="hotbar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
