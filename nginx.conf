server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"budowac-client"}\n';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
